# Server Configurations
server.port=8300
server.servlet.context-path=/api

# Database Configurations
spring.datasource.url=jdbc:mysql://localhost:3306/tradevault?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=balam00000
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true

# SQL Initialization (runs data.sql after Hibernate creates tables)
spring.sql.init.mode=always

# JWT Configurations (HS512 HMAC secret: needs to be at least 512 bits / 64 characters)
tradevault.jwt.secret=9a611c3c-8b83-4aef-ba9c-73a7c645e546-4c4f346e-1d57-418f-a9cb-d1a1005a96d1-tradevault-secure-jwt-key
tradevault.jwt.expiration-ms=86400000

# Logging Configurations
logging.level.org.springframework.security=INFO
logging.level.com.tradevault=DEBUG

# OpenAPI / Swagger Configurations
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
