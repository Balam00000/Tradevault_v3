# ─── Test Profile — H2 In-Memory Database ─────────────────────────────────────
# Used by: src/test/java/**/*Test.java via @ActiveProfiles("test")
# ─────────────────────────────────────────────────────────────────────────────

# Use H2 in-memory database (no MySQL required for tests)
spring.datasource.url=jdbc:h2:mem:tradevault_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Disable data.sql seeding for tests
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# JWT (test values)
tradevault.jwt.secret=test-secret-key-for-junit-tests-only-not-for-production-use-32chars
tradevault.jwt.expiration-ms=3600000

# Suppress Hibernate schema generation noise in tests
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql=WARN
logging.level.com.tradevault=INFO
logging.level.org.springframework.security=WARN

# Disable scheduling in tests to avoid cron job interference
spring.task.scheduling.enabled=false
